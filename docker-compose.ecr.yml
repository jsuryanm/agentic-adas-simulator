services:
  backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${AWS_BACKEND_REPO}:latest
    
    env_file:
      - .env

    ports:
      - "8000:8000"
    
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    
    volumes:
      - /tmp/adas_uploads:/tmp/adas_uploads

    healthcheck:  
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    restart: unless-stopped # auto-restart if container crashes 

  
  frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${AWS_FRONTEND_REPO}:latest
    
    ports:
      - "8501:8501"
    
    environment:
      - BACKEND_URL=http://backend:8000
    
    depends_on:
      backend:
        condition: service_healthy
  